name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync environment
        run: uv sync --frozen --extra dev
      - name: Ruff (zero tolerance)
        run: uv run ruff check src tests examples
      - name: Mypy (stable domain core)
        run: uv run mypy src/eflux/agents/decision.py src/eflux/market src/eflux/ecosystem/release_contract.py src/eflux/ecosystem/deployment.py
      - name: Tests (offline — conftest blocks real network)
        run: uv run pytest tests -q
      - name: Validate canonical checkpoints
        run: PYTHONPATH=src uv run python scripts/verify_checkpoints.py
      - name: Rehearse fresh and previous-head migrations
        run: |
          EFLUX_DB_URL=sqlite+aiosqlite:////tmp/eflux-fresh.db uv run alembic upgrade head
          EFLUX_DB_URL=sqlite+aiosqlite:////tmp/eflux-fresh.db uv run alembic check
          EFLUX_DB_URL=sqlite+aiosqlite:////tmp/eflux-upgrade.db uv run alembic upgrade 0009
          EFLUX_DB_URL=sqlite+aiosqlite:////tmp/eflux-upgrade.db uv run alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck + build
        run: pnpm build

  openapi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Sync backend environment
        run: uv sync --frozen --extra dev
      - name: Regenerate checked-in contracts
        run: pnpm -C frontend generate:api
      - name: Fail on contract drift
        run: git diff --exit-code -- docs/openapi.json docs/agent_spec.schema.json frontend/src/api/schema.gen.ts
