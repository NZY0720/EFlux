# Production-shaped local deployment: Postgres holds durable application data and
# Redis backs cross-process event delivery. `tasks.sh` intentionally remains
# SQLite + in-memory bus for zero-setup development.
services:
  backend:
    build:
      context: .
      target: backend
    environment:
      EFLUX_ENV: prod
      EFLUX_CORS_ORIGINS: http://localhost:8080
      EFLUX_DB_URL: postgresql+asyncpg://eflux:eflux@postgres:5432/eflux
      EFLUX_AUTO_CREATE_SCHEMA: "false"
      EFLUX_BUS_BACKEND: redis
      EFLUX_REDIS_URL: redis://redis:6379/0
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn eflux.api.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: .
      target: web
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    expose:
      - "6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eflux
      POSTGRES_PASSWORD: eflux
      POSTGRES_DB: eflux
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"

volumes:
  postgres-data:
