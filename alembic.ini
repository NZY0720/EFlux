# Alembic configuration.
#
# The actual database URL is read at runtime from eflux.config.Settings.db_url
# (see alembic/env.py) — `sqlalchemy.url` here is intentionally left blank
# so dev/test/prod can all share this same config file.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

# Use a stable, human-friendly file name template instead of the default hash.
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]
# (none — run `ruff format alembic/versions/*.py` manually if you want)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
