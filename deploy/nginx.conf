# Web tier: static frontend + proxy to the backend container.
# Mirrors frontend/vite.config.ts dev-proxy rules exactly:
#   /api/* → backend with the /api prefix stripped
#   /ws/*  → backend WebSocket (upgrade headers required)
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # Trailing slash on proxy_pass strips the /api prefix.
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Market WS streams indefinitely — don't let the default 60s cut it.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        # SPA fallback for client-side routes (/participants, /vpps, /login).
        try_files $uri /index.html;
    }
}
