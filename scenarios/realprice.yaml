  # ===================== VPP — LLM strategists (5 heterogeneous, each mirrored) =====================
  - name: vpp-llm-solar-prosumer
    agent: hybrid
    seed: 226
    params: { pv_kw_peak: 9.0, battery_kwh: 18.0, battery_kw_max: 5.0, load_kw_base: 1.5, markup_floor: 0.4 }
    agent_params: { demand_beta: 0.5 }
    executor: { kind: ppo_online, checkpoint: checkpoints/bc_primitive_realprice_grid_v1.pt }
    persona:
      name: solar-prosumer
      prompt: >-
        You run a large rooftop solar prosumer. Sell the midday surplus at the
        real-time price and time-shift with the battery toward the evening peak.
        Prefer liquidate_surplus and grid_discharge_on_peak; keep soc_target
        moderate for the evening sell.
    mirror: true
  - name: vpp-llm-wind-conservative
    agent: hybrid
    seed: 227
    params: { pv_kw_peak: 0.0, wind_kw_rated: 10.0, wind_mean_speed: 9.0, battery_kwh: 12.0, battery_kw_max: 4.0, load_kw_base: 0.6, markup_floor: 0.4 }
    executor: { kind: ppo_online, checkpoint: checkpoints/bc_primitive_realprice_grid_v1.pt }
    persona:
      name: conservative-wind-farmer
      prompt: >-
        You manage a wind farm and protect revenue. Never sell below marginal
        cost; prefer steady sales over occasional big wins. Favor
        liquidate_surplus at acceptable prices and grid_discharge_on_peak;
        keep risk_budget moderate.
    mirror: true
  - name: vpp-llm-balanced-mm
    agent: hybrid
    seed: 228
    params: { pv_kw_peak: 3.0, battery_kwh: 22.0, battery_kw_max: 6.0, load_kw_base: 3.0, markup_floor: 0.4 }
    agent_params: { demand_beta: 0.5 }
    executor: { kind: ppo_online, checkpoint: checkpoints/bc_primitive_realprice_grid_v1.pt }
    persona:
      name: balanced-market-maker
      prompt: >-
        You are a balanced battery arbitrageur. Buy the dips with
        grid_charge_on_dip, sell the peaks with grid_discharge_on_peak or
        battery_arbitrage, and keep the battery near neutral. Avoid
        aggressive_taker; keep the learner stable.
    mirror: true
  - name: vpp-llm-demand-buyer
    agent: hybrid
    seed: 229
    params: { pv_kw_peak: 0.0, battery_kwh: 12.0, battery_kw_max: 4.0, load_kw_base: 6.0, load_profile: commercial, markup_floor: 0.4 }
    agent_params: { demand_beta: 0.5 }
    executor: { kind: ppo_online, checkpoint: checkpoints/bc_primitive_realprice_grid_v1.pt }
    persona:
      name: cost-minimizing-buyer
      prompt: >-
        You procure power for a commercial building. Minimize cost: charge the
        battery when prices dip toward the midday solar floor, avoid buying at
        evening peaks. Favor cover_deficit only when load is urgent, else hold.
    mirror: true
  - name: vpp-llm-pure-trader
    agent: hybrid
    seed: 230
    params: { pv_kw_peak: 0.0, battery_kwh: 20.0, battery_kw_max: 5.0, load_kw_base: 0.0, markup_floor: 0.4 }
    agent_params: { demand_beta: 0.5 }
    executor: { kind: ppo_online, checkpoint: checkpoints/bc_primitive_realprice_grid_v1.pt }
    persona:
      name: pure-battery-trader
      prompt: >-
        You trade only battery inventory against the real-time grid price. Charge
        on dips, discharge on peaks, and preserve headroom for repeated arbitrage.
        Favor grid_charge_on_dip, grid_discharge_on_peak, and battery_arbitrage.
    mirror: true
