# EFlux real-time-price roster (EFLUX_MARKET_MODE=realprice) — leaner consumer/provider/VPP.
#
# Every agent is a pure price-taker against the live CAISO price (orders settle vs the grid
# at import/export; agents never trade each other). So this is a strategy-vs-grid timing
# testbed: a leaner slice of the taxonomy — fewer archetypes, NO gas (no merit-order book to
# anchor), the same five strategies per cell, and 5 mirrored LLM VPPs (incl. a
# battery-only pure trader).
#
#   CONSUMER: residential | ev          (2 x 5 = 10)
#   PROVIDER: pv | wind                 (2 x 5 = 10)
#   VPP:      5 non-LLM + 5 LLM (each mirrored)  (10 declared + 5 mirrors)
# Declared = 30, Live = 35 (30 + 5 mirrors).
#
# price_ref (cost basis) is intentionally NOT pegged to the live CAISO LMP — agents trade on
# the live-price-vs-cost spread, which is exactly the timing signal under test.

schema_version: "1"
name: realprice-benchmark-roster
market_mode: realprice
participants:

  # ===================== CONSUMER (2 archetypes x 5 strategies) =====================
  # --- residential load ---
  - name: consumer-residential-truthful
    agent: truthful
    seed: 201
    params: { pv_kw_peak: 3.5, battery_kwh: 10.0, battery_kw_max: 3.0, load_kw_base: 2.5, load_profile: residential, markup_floor: 0.4 }
    agent_params: { demand_beta: 0.5 }
  - name: consumer-residential-zip
