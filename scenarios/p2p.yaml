    agent: truthful
    seed: 201
    params: { pv_kw_peak: 0.0, battery_kwh: 60.0, battery_kw_max: 11.0, load_kw_base: 11.0, load_profile: ev, load_elasticity: 0.8, markup_floor: 0.4 }
