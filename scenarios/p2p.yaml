# EFlux P2P-market roster (EFLUX_MARKET_MODE=p2p) — consumer / provider / VPP taxonomy.
#
# Consumer, PV, wind, and mixed VPP cells are instantiated across the five non-LLM
# strategies (truthful, zip, gd, aa, ppo). LLM strategists appear only in the VPP type
# (5 heterogeneous incl. a battery-only pure trader, each mirrored by a strategist-less
# PPO twin for A/B attribution).
# Gas is kept as one storage-free Truthful backstop; the valuation oracle meters fuel
# onto the sell side at marginal cost.
#
#   CONSUMER: ev | industrial | commercial | residential   (4 x 5 = 20)
#   PROVIDER: pv | wind                                     (2 x 5 = 10)
#             gas                                           (truthful only = 1)
#   VPP:      5 non-LLM prosumers + 5 LLM (each mirrored)    (10 declared + 5 mirrors)
# Declared = 41, Live = 46 (41 + 5 mirrors). PPO learners: 8 standalone-equivalent
# + 5 mirrored. Validated entry-by-entry as AgentSpec (src/eflux/simulator/agent_spec.py).
#
# price_ref is re-based to the trailing-month CAISO mean (jittered +/-6% for cost-based
# agents; unjittered for ppo/hybrid to match the checkpoint scale). p2p never anchors its
# clearing price to CAISO (free discovery).

vpps:

  # ===================== CONSUMER (4 archetypes x 5 strategies) =====================
  # --- ev load ---
